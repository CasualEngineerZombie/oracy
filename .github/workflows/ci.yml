name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install uv
        run: pip install uv
      
      - name: Install Python dependencies
        working-directory: server
        run: uv sync --frozen --no-dev
      
      - name: Run Python linters
        working-directory: server
        run: |
          uv run flake8 apps --max-line-length=120 --ignore=E501,W503
          uv run isort --check-only --diff apps
          uv run black --check apps
      
      - name: Install frontend dependencies
        working-directory: client
        run: npm ci
      
      - name: Run frontend linter
        working-directory: client
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: oracy_test
          POSTGRES_USER: oracy
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        run: pip install uv
      
      - name: Install dependencies
        working-directory: server
        run: uv sync --frozen
      
      - name: Run Django tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://oracy:test_password@localhost:5432/oracy_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          DEBUG: false
        run: uv run pytest --cov=apps --cov-report=xml
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: client
        run: npm ci
      
      - name: Run frontend tests
        working-directory: client
        run: npm run test -- --coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile.dev
          push: false
          tags: oracy-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install and build frontend
        working-directory: client
        run: |
          npm ci
          npm run build
