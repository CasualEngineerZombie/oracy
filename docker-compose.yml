version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: oracy-db
    environment:
      POSTGRES_DB: oracy
      POSTGRES_USER: oracy
      POSTGRES_PASSWORD: oracy_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oracy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: oracy-minio
    environment:
      MINIO_ROOT_USER: oracy
      MINIO_ROOT_PASSWORD: oracy_dev_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: oracy-backend
    environment:
      - DATABASE_URL=postgresql://oracy:oracy_dev_password@db:5432/oracy
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=oracy
      - MINIO_SECRET_KEY=oracy_dev_secret
      - MINIO_BUCKET=oracy
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=true
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - JWT_ACCESS_TOKEN_LIFETIME=60
      - JWT_REFRESH_TOKEN_LIFETIME=1440
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  celery:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: oracy-celery
    environment:
      - DATABASE_URL=postgresql://oracy:oracy_dev_password@db:5432/oracy
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=oracy
      - MINIO_SECRET_KEY=oracy_dev_secret
      - MINIO_BUCKET=oracy
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
      - minio
    command: celery -A celery_app worker -l info

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: oracy-frontend
    environment:
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.vite
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  minio_data:
